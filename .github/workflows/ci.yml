# Continuous integration: build the plugin and run all unit tests on every
# pull request and on every push to main. Runs on a Windows runner so we can
# use real MSBuild against .NET Framework 4.8 with the actual SimHub
# reference DLLs (downloaded from the official SimHub GitHub release zip).
#
# This is the primary safety net before merging — Test 17 (the v1.1.31 cast
# bug regression) and Tests 15/16 (auto-rotate guards) all run here.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older in-flight runs of the same branch/PR if a newer push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned SimHub build used to satisfy SimHub.Plugins / GameReaderCommon /
  # MahApps / WoteverCommon / log4net references. Bumping this means re-validating
  # the plugin against a newer SimHub.Plugins API surface — do it in a separate PR.
  #
  # NOTE: the asset published at SHWotever/SimHub/releases is a ZIP wrapping a
  # single Inno Setup installer (SimHubSetup_X.Y.Z.exe), not a portable layout.
  # We extract the ZIP, then run the .exe with /VERYSILENT /DIR=... to populate
  # a known directory we can reference from MSBuild.
  SIMHUB_VERSION: "9.11.12"
  SIMHUB_ZIP_URL: "https://github.com/SHWotever/SimHub/releases/download/9.11.12/SimHub.9.11.12.zip"
  SIMHUB_INSTALL_DIR: "C:\\SimHubInstall"

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore SimHub install (cache)
        id: simhub-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SIMHUB_INSTALL_DIR }}
          # v2 cache key: the v1 layout assumed a portable ZIP. The release asset
          # is now an Inno Setup installer that we run silent into SIMHUB_INSTALL_DIR,
          # so the cached path layout is different from any v1 cache entry.
          key: simhub-install-${{ env.SIMHUB_VERSION }}-v2

      - name: Download and silent-install SimHub (if cache miss)
        if: steps.simhub-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'SimHub.zip'
          Write-Host "Downloading $env:SIMHUB_ZIP_URL"
          Invoke-WebRequest -Uri $env:SIMHUB_ZIP_URL -OutFile $zip -UseBasicParsing
          $size = (Get-Item $zip).Length
          Write-Host "Downloaded $([math]::Round($size/1MB,1)) MB"

          $extractDir = Join-Path $env:RUNNER_TEMP 'SimHubExtract'
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Write-Host "Extracting installer..."
          Expand-Archive -Path $zip -DestinationPath $extractDir -Force
          Remove-Item $zip -Force

          $setup = Get-ChildItem $extractDir -Recurse -Filter 'SimHubSetup_*.exe' | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::SimHubSetup_*.exe not found in archive."
            Get-ChildItem $extractDir -Recurse | Select-Object -First 50 FullName | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "Installer: $($setup.FullName) ($([math]::Round($setup.Length/1MB,1)) MB)"

          New-Item -ItemType Directory -Force -Path $env:SIMHUB_INSTALL_DIR | Out-Null
          $logPath = Join-Path $env:RUNNER_TEMP 'simhub-install.log'

          # Inno Setup silent flags. /DIR overrides the default Program Files
          # location so we control where the DLLs end up and the cache works.
          # /SP- skips the welcome dialog. /NORESTART because the runner is
          # ephemeral. /SUPPRESSMSGBOXES auto-confirms any modal prompts.
          $installArgs = @(
            "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-",
            "/DIR=$env:SIMHUB_INSTALL_DIR",
            "/LOG=$logPath"
          )
          Write-Host "Running silent installer with args: $($installArgs -join ' ')"
          $proc = Start-Process -FilePath $setup.FullName -ArgumentList $installArgs -Wait -NoNewWindow -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "::error::SimHub installer exited with code $($proc.ExitCode)"
            if (Test-Path $logPath) {
              Write-Host "--- Last 80 lines of $logPath ---"
              Get-Content $logPath -Tail 80 | ForEach-Object { Write-Host "  $_" }
            }
            exit 1
          }

          $found = Get-ChildItem $env:SIMHUB_INSTALL_DIR -Recurse -Filter 'SimHub.Plugins.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $found) {
            Write-Host "::error::Installer succeeded but SimHub.Plugins.dll not found under $env:SIMHUB_INSTALL_DIR"
            Get-ChildItem $env:SIMHUB_INSTALL_DIR -Recurse | Select-Object -First 50 FullName | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "Installed. SimHub.Plugins.dll at: $($found.FullName)"
          Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue

      - name: Resolve SIMHUB_INSTALL_PATH and verify required DLLs
        id: simhub-path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $found = Get-ChildItem $env:SIMHUB_INSTALL_DIR -Recurse -Filter 'SimHub.Plugins.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $found) {
            Write-Host "::error::SimHub.Plugins.dll missing under $env:SIMHUB_INSTALL_DIR after cache restore."
            exit 1
          }
          # MSBuild expects the path to end with a trailing backslash because
          # the csproj concatenates "$(SimHubInstallPath)GameReaderCommon.dll".
          $simHubDir = $found.Directory.FullName
          if (-not $simHubDir.EndsWith('\')) { $simHubDir = $simHubDir + '\' }
          Write-Host "SimHub install path: $simHubDir"
          $required = @('SimHub.Plugins.dll','GameReaderCommon.dll','SimHub.Logging.dll','log4net.dll','MahApps.Metro.dll','MahApps.Metro.IconPacks.Material.dll','WoteverCommon.dll')
          $missing = @()
          foreach ($r in $required) {
            $p = Join-Path $simHubDir $r
            if (-not (Test-Path $p)) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            Write-Host "::error::Missing DLLs in SimHub install dir: $($missing -join ', ')"
            exit 1
          }
          "SIMHUB_INSTALL_PATH=$simHubDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build (Release)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = "src\Overtake.SimHub.Plugin\Overtake.SimHub.Plugin.csproj"
          # The PostBuildEvent in the csproj XCOPYs the DLL into the SimHub
          # install folder. On the runner that path is read-only / locked, so
          # we suppress the post-build to avoid MSB3073. We still verify the
          # produced DLL below.
          msbuild $proj /p:Configuration=Release /p:SimHubInstallPath="$env:SIMHUB_INSTALL_PATH" /p:PostBuildEvent= /verbosity:minimal /nologo
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::MSBuild failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          $dll = "src\Overtake.SimHub.Plugin\bin\Release\Overtake.SimHub.Plugin.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "::error::Build succeeded but DLL not found at $dll"
            exit 1
          }
          $version = (Get-Item $dll).VersionInfo.FileVersion
          $size = [math]::Round((Get-Item $dll).Length / 1KB, 1)
          Write-Host "Built $dll (v$version, $size KB)"

      - name: Run SessionStore tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dll = "src\Overtake.SimHub.Plugin\bin\Release\Overtake.SimHub.Plugin.dll"
          $output = & powershell -ExecutionPolicy Bypass -File "scripts\Test-SessionStore.ps1" -DllPath $dll 2>&1
          $output | ForEach-Object { Write-Host $_ }
          $summary = $output | Select-String -Pattern 'PASS:\s*\d+\s+FAIL:\s*(\d+)' | Select-Object -Last 1
          if (-not $summary) {
            Write-Host "::error::Could not parse test summary line from Test-SessionStore.ps1"
            exit 1
          }
          $failCount = [int]$summary.Matches[0].Groups[1].Value
          if ($failCount -gt 0) {
            Write-Host "::error::Test-SessionStore.ps1 reported $failCount failures"
            exit 1
          }

      - name: Run Finalizer tests (includes Test 17 cast bug regression)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dll = "src\Overtake.SimHub.Plugin\bin\Release\Overtake.SimHub.Plugin.dll"
          $output = & powershell -ExecutionPolicy Bypass -File "scripts\Test-Finalizer.ps1" -DllPath $dll 2>&1
          $output | ForEach-Object { Write-Host $_ }
          $summary = $output | Select-String -Pattern 'PASS:\s*\d+\s+FAIL:\s*(\d+)' | Select-Object -Last 1
          if (-not $summary) {
            Write-Host "::error::Could not parse test summary line from Test-Finalizer.ps1"
            exit 1
          }
          $failCount = [int]$summary.Matches[0].Groups[1].Value
          if ($failCount -gt 0) {
            Write-Host "::error::Test-Finalizer.ps1 reported $failCount failures"
            exit 1
          }

      - name: Upload built DLL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overtake.SimHub.Plugin-${{ github.sha }}
          path: src/Overtake.SimHub.Plugin/bin/Release/Overtake.SimHub.Plugin.dll
          retention-days: 14
          if-no-files-found: error
